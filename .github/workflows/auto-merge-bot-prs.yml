name: Auto-merge approved bot PRs

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - ready_for_review
  check_suite:
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest

    steps:
      - name: Evaluate PR
        id: eval
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.setOutput("should_merge", "false");
              return;
            }

            const actor = (pr.user && pr.user.login) || "";
            const labels = (pr.labels || []).map(l => l.name);

            const allowedActors = [
              "copilot-swe-agent[bot]",
              "dependabot[bot]",
              "github-actions[bot]"
            ];

            const hasSafeLabel = labels.includes("safe-to-automerge");
            const actorAllowed = allowedActors.includes(actor);

            core.setOutput("should_merge", actorAllowed && hasSafeLabel ? "true" : "false");
            core.setOutput("pr_number", String(pr.number));

      - name: Enable auto-merge
        if: steps.eval.outputs.should_merge == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr merge "${{ steps.eval.outputs.pr_number }}" \
            --auto \
            --squash \
            --delete-branch
